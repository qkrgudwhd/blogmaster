  <!-- Three.js 3D 물리 배경 + 커서 트레일 -->
  <script>
    function initBG() {
      const cv=document.getElementById('bg-canvas');
      if(!cv||typeof THREE==='undefined') return;
      const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);
      cam.position.z=38;
      const rdr=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
      rdr.setSize(innerWidth,innerHeight); rdr.setPixelRatio(Math.min(devicePixelRatio,2));
      sc.add(new THREE.AmbientLight(0xd4c8f0,1.5));
      const ml=new THREE.PointLight(0xffffff,2.5,40); ml.position.set(0,0,15); sc.add(ml);
      [[0x6c3eb6,[-18,12,8]],[0xd4a43a,[18,-12,8]],[0x8b5cf6,[0,18,6]],[0x3b1f6e,[-18,-12,6]]].forEach(([c,p])=>{
        const l=new THREE.PointLight(c,1.8,60); l.position.set(...p); sc.add(l);
      });
      const GS=[new THREE.BoxGeometry(1,1,1),new THREE.SphereGeometry(.65,14,10),new THREE.ConeGeometry(.55,1.2,7),
        new THREE.TorusGeometry(.55,.18,10,20),new THREE.OctahedronGeometry(.78),new THREE.TetrahedronGeometry(.88),
        new THREE.IcosahedronGeometry(.68),new THREE.CylinderGeometry(.38,.38,1.1,8),
        new THREE.TorusKnotGeometry(.42,.14,60,8),new THREE.DodecahedronGeometry(.68)];
      const PAL=[0x6c3eb6,0x8b5cf6,0x3b1f6e,0xd4a43a,0xa78bfa,0xddd6fe,0xc4b5fd,0xe8950e,0x7c3aed,0xf59e0b,0x9f7aea,0xede9fe];
      const SH=[]; const N=80;
      for(let i=0;i<N;i++){
        const col=PAL[Math.floor(Math.random()*PAL.length)], wire=Math.random()<.28;
        const mat=wire?new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:.5})
          :new THREE.MeshStandardMaterial({color:col,roughness:.15,metalness:.75,transparent:true,opacity:.88,emissive:col,emissiveIntensity:.18});
        const m=new THREE.Mesh(GS[i%GS.length],mat);
        m.scale.setScalar(.35+Math.random()*1.9);
        m.position.set((Math.random()-.5)*58,(Math.random()-.5)*40,(Math.random()-.5)*16-4);
        m.rotation.set(Math.random()*6.28,Math.random()*6.28,Math.random()*6.28);
        m.userData={vx:(Math.random()-.5)*.045,vy:(Math.random()-.5)*.045,
          rx:(Math.random()-.5)*.028,ry:(Math.random()-.5)*.028,rz:(Math.random()-.5)*.018,bc:col,wire};
        sc.add(m); SH.push(m);
      }
      const m3={x:0,y:0},rc=new THREE.Raycaster(),mn=new THREE.Vector2(-999,-999);
      const pl=new THREE.Plane(new THREE.Vector3(0,0,1),0),ip=new THREE.Vector3();
      document.addEventListener('mousemove',e=>{
        mn.x=(e.clientX/innerWidth)*2-1; mn.y=(e.clientY/innerHeight)*-2+1;
        rc.setFromCamera(mn,cam); if(rc.ray.intersectPlane(pl,ip)){m3.x=ip.x;m3.y=ip.y;}
        ml.position.set(m3.x,m3.y,14);
      });
      document.addEventListener('click',e=>{
        const cx=((e.clientX/innerWidth)*2-1)*29, cy=((e.clientY/innerHeight)*-2+1)*20;
        SH.forEach(m=>{const dx=m.position.x-cx,dy=m.position.y-cy,d=Math.sqrt(dx*dx+dy*dy)+.01;
          if(d<16){const f=((16-d)/16)*.45;m.userData.vx+=(dx/d)*f;m.userData.vy+=(dy/d)*f;}});
      });
      let t=0;
      (function loop(){requestAnimationFrame(loop);t+=.012;ml.color.setHSL(0.75+Math.sin(t*.4)*.06,0.6,.7);
        SH.forEach((m,i)=>{const ud=m.userData,dx=m.position.x-m3.x,dy=m.position.y-m3.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
          if(d<11){const f=Math.pow((11-d)/11,2)*.14;ud.vx+=(dx/d)*f;ud.vy+=(dy/d)*f;
            if(!ud.wire){m.material.color.setHSL(0.73+Math.sin(t+i*.4)*.06,0.7,.58);m.material.emissiveIntensity=.3;}}
          else if(!ud.wire){m.material.color.set(ud.bc);m.material.emissiveIntensity=.18;}
          m.position.x+=ud.vx;m.position.y+=ud.vy;ud.vx*=.972;ud.vy*=.972;
          const bx=32,by=23;
          if(m.position.x>bx){m.position.x=bx;ud.vx*=-.65;}if(m.position.x<-bx){m.position.x=-bx;ud.vx*=-.65;}
          if(m.position.y>by){m.position.y=by;ud.vy*=-.65;}if(m.position.y<-by){m.position.y=-by;ud.vy*=-.65;}
          m.rotation.x+=ud.rx;m.rotation.y+=ud.ry;m.rotation.z+=ud.rz;});
        rdr.render(sc,cam);})();
      window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();rdr.setSize(innerWidth,innerHeight);});
    }
    function initCursor(){
      const cv=document.getElementById('cursor-canvas'); if(!cv)return;
      const ctx=cv.getContext('2d'); cv.width=innerWidth; cv.height=innerHeight;
      document.body.style.cursor='none';

      /* ── 별똥별 꼬리 (짧게) ── */
      const TAIL_LEN=10;
      const trail=[];
      let mx=-300,my=-300,px=-300,py=-300;

      /* ── 반짝이 파티클 ── */
      const sparks=[];
      function spawnSpark(x,y){
        for(let i=0;i<2;i++){
          const ang=Math.random()*Math.PI*2;
          const spd=0.4+Math.random()*1.6;
          sparks.push({
            x,y,
            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
            r:0.8+Math.random()*1.8,
            life:1, decay:0.032+Math.random()*0.022,
            hue:40+Math.random()*35   // 노랑~금색
          });
        }
      }

      document.addEventListener('mousemove',e=>{
        px=mx; py=my; mx=e.clientX; my=e.clientY;
        trail.push({x:mx,y:my});
        if(trail.length>TAIL_LEN) trail.shift();
        spawnSpark(mx,my);
      });

      /* ── 5각 별 그리기 함수 ── */
      function drawStar(cx,cy,spikes,outerR,innerR,color,alpha){
        ctx.save();
        ctx.globalAlpha=alpha;
        ctx.beginPath();
        const step=Math.PI/spikes;
        for(let i=0;i<spikes*2;i++){
          const r=i%2===0?outerR:innerR;
          const a=i*step - Math.PI/2;
          i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)
               :ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.fillStyle=color;
        ctx.shadowColor=color;
        ctx.shadowBlur=8;
        ctx.fill();
        ctx.globalAlpha=1;
        ctx.restore();
      }

      let t=0;
      (function frame(){
        requestAnimationFrame(frame);
        t+=0.016;
        ctx.clearRect(0,0,cv.width,cv.height);

        /* ── 꼬리 ── */
        if(trail.length>2){
          for(let i=0;i<trail.length-1;i++){
            const p0=trail[i], p1=trail[i+1];
            const frac=(i+1)/trail.length;
            const alpha=frac*frac*0.75;
            const width=frac*7+0.5;
            const hue=45+frac*15;           // 금빛→노랑
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(p0.x,p0.y);
            ctx.lineTo(p1.x,p1.y);
            ctx.strokeStyle=`hsla(${hue},100%,78%,${alpha})`;
            ctx.lineWidth=width;
            ctx.lineCap='round';
            ctx.lineJoin='round';
            ctx.stroke();
            ctx.restore();
          }
          /* 꼬리 은은한 발광 */
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(trail[0].x,trail[0].y);
          for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
          ctx.strokeStyle='rgba(255,220,80,0.08)';
          ctx.lineWidth=14;
          ctx.lineCap='round';
          ctx.filter='blur(5px)';
          ctx.stroke();
          ctx.filter='none';
          ctx.restore();
        }

        /* ── 반짝이 파티클 ── */
        for(let i=sparks.length-1;i>=0;i--){
          const s=sparks[i];
          s.x+=s.vx; s.y+=s.vy;
          s.vy+=0.04;           // 살짝 중력
          s.life-=s.decay;
          if(s.life<=0){sparks.splice(i,1);continue;}
          drawStar(s.x,s.y, 4, s.r*s.life*2.2, s.r*s.life*0.9,
            `hsla(${s.hue},100%,88%,1)`, s.life*0.85);
        }

        /* ── 별 핵 외부 발광 ── */
        const glowG=ctx.createRadialGradient(mx,my,0,mx,my,22);
        glowG.addColorStop(0,'rgba(255,255,180,0.85)');
        glowG.addColorStop(0.45,'rgba(255,210,60,0.35)');
        glowG.addColorStop(1,'rgba(255,160,0,0)');
        ctx.beginPath(); ctx.arc(mx,my,22,0,6.28);
        ctx.fillStyle=glowG; ctx.fill();

        /* ── 별 모양 핵 (5각별, 맥박 효과) ── */
        const pulse=1+Math.sin(t*7)*0.14;
        drawStar(mx,my, 5, 10*pulse, 4.5*pulse, 'rgba(255,255,220,1)', 1);
        drawStar(mx,my, 5, 6*pulse,  2.5*pulse, 'rgba(255,240,100,1)', 1);

        /* ── 십자 빛줄기 ── */
        const blink=0.6+Math.sin(t*9)*0.4;
        [[1,0],[0,1],[-1,0],[0,-1]].forEach(([dx,dy])=>{
          const rayLen=12*pulse;
          const rayG=ctx.createLinearGradient(mx,my,mx+dx*rayLen,my+dy*rayLen);
          rayG.addColorStop(0,`rgba(255,255,200,${blink*0.9})`);
          rayG.addColorStop(1,'rgba(255,220,80,0)');
          ctx.beginPath();
          ctx.moveTo(mx,my);
          ctx.lineTo(mx+dx*rayLen,my+dy*rayLen);
          ctx.strokeStyle=rayG;
          ctx.lineWidth=1.8;
          ctx.stroke();
        });
      })();
      window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;});
    }
    window.addEventListener('load',()=>{initCursor();});
  </script>

    const lock=()=>document.body.classList.add('noscroll');
    const unlock=()=>document.body.classList.remove('noscroll');
    function useFade(){useEffect(()=>{const els=document.querySelectorAll('.fi');
      const ob=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('vis');ob.unobserve(x.target);}}),{threshold:.1});
      els.forEach(el=>ob.observe(el));return()=>ob.disconnect();},[]);}
    function TCard({children,cls='',style={}}){
      const r=useRef();
      return(<div ref={r} className={`tilt ${cls}`} style={style}
        onMouseMove={e=>{const b=r.current.getBoundingClientRect();
          const rx=((e.clientY-b.top-b.height/2)/(b.height/2))*-15,ry=((e.clientX-b.left-b.width/2)/(b.width/2))*15;
          r.current.style.transform=`perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;}}
        onMouseLeave={()=>{r.current.style.transform='perspective(1000px) rotateX(0) rotateY(0) scale(1)';}}>
        {children}</div>);

    /* ── 팡파레 소리 (Web Audio API) ── */
    function playFanfare(){
      try{
        const AC=window.AudioContext||window.webkitAudioContext;
        if(!AC) return;
        const ctx=new AC();
        // C5→E5→G5→C6 상승 코드 + 마지막 화음
        const seq=[
          {f:523.25,t:0,   d:0.14},{f:659.25,t:0.12,d:0.14},{f:783.99,t:0.24,d:0.14},
          {f:1046.5,t:0.38,d:0.55},{f:783.99,t:0.38,d:0.55},{f:659.25,t:0.38,d:0.55},
        ];
        seq.forEach(({f,t,d})=>{
          const osc=ctx.createOscillator(),gain=ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value=f; osc.type='triangle';
          gain.gain.setValueAtTime(0,ctx.currentTime+t);
          gain.gain.linearRampToValueAtTime(0.28,ctx.currentTime+t+0.02);
          gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);
          osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+d+0.05);
        });
      }catch(e){}
    }

    /* ── 폭죽 캔버스 컴포넌트 ── */
    function Fireworks(){
      const ref=useRef();
      useEffect(()=>{
        const cv=ref.current; if(!cv) return;
        cv.width=window.innerWidth; cv.height=window.innerHeight;
        const ctx=cv.getContext('2d');
        const COLS=['#6c3eb6','#8b5cf6','#d4a43a','#3b1f6e','#e8950e','#6c3eb6','#f59e0b','#c4b5fd','#9f7aea','#ddd6fe'];
        const pts=[];
        // 8번 버스트를 순차 발사
        for(let b=0;b<8;b++){
          setTimeout(()=>{
            const bx=100+Math.random()*(cv.width-200);
            const by=60+Math.random()*(cv.height*0.55);
            const col=COLS[Math.floor(Math.random()*COLS.length)];
            const col2=COLS[Math.floor(Math.random()*COLS.length)];
            for(let i=0;i<90;i++){
              const ang=(Math.PI*2*i/90)+Math.random()*.25;
              const spd=2.5+Math.random()*6.5;
              pts.push({x:bx,y:by,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
                color:i%2===0?col:col2,life:1,decay:.012+Math.random()*.01,sz:2.5+Math.random()*3});
            }
          },b*220);
        }
        let af;
        const draw=()=>{
          ctx.clearRect(0,0,cv.width,cv.height);
          for(let i=pts.length-1;i>=0;i--){
            const p=pts[i];
            p.x+=p.vx; p.y+=p.vy; p.vy+=0.09; p.vx*=0.98;
            p.life-=p.decay;
            if(p.life<=0){pts.splice(i,1);continue;}
            ctx.globalAlpha=p.life;
            ctx.fillStyle=p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha=1;
          if(pts.length>0||true) af=requestAnimationFrame(draw);
        };
        draw();
        // 3.5초 후 자동 종료
        const tid=setTimeout(()=>cancelAnimationFrame(af),3500);
        return()=>{cancelAnimationFrame(af);clearTimeout(tid);};
      },[]);
      return <canvas ref={ref} style={{position:'fixed',inset:0,zIndex:250,pointerEvents:'none'}}/>;
    }

                  {d:'일요일 · 공휴일',t:'카카오 오픈채팅 문의'},
                ].map((r,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid rgba(108,62,182,.05)',fontSize:'.88rem'}}>
                    <span style={{color:'#3b1f6e',fontWeight:600}}>{r.d}</span>
                    <span style={{color:'#3b1f6e',fontWeight:700}}>{r.t}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 오른쪽: CTA 버튼들 */}
            <div className="fi" style={{display:'flex',flexDirection:'column',gap:'16px',transitionDelay:'80ms'}}>
              {/* 수강신청 CTA */}
              <TCard cls="np" style={{borderRadius:'20px',overflow:'hidden',border:'1px solid rgba(212,164,58,.4)'}}>
                <div style={{background:'linear-gradient(135deg,rgba(108,62,182,.2),rgba(212,164,58,.1))',padding:'28px 26px',textAlign:'center'}}>
                  <div style={{fontSize:'2.8rem',marginBottom:'10px'}}>🚀</div>
                  <h3 style={{fontSize:'1.25rem',fontWeight:900,color:'#d4a43a',marginBottom:'8px',textShadow:'0 0 14px rgba(212,164,58,.5)'}}>지금 바로 수강 신청</h3>
                  <p style={{color:'#6b7280',lineHeight:1.65,fontSize:'.95rem',marginBottom:'18px'}}>
                    선착순 한정 인원 · 1:1 맞춤 코칭 보장<br/>
                    <span style={{color:'#e8950e',fontWeight:700}}>2026년 5월 1기 모집 중!</span>
                  </p>
                  <button onClick={onEnroll} className="bwarm" style={{width:'100%',padding:'15px',border:'none',fontSize:'1.05rem',borderRadius:'13px',cursor:'pointer',fontWeight:900}}>
                    📋 수강 신청서 작성하기
                  </button>
                </div>
              </TCard>

              {/* 카카오 문의 */}
              <TCard cls="ny" style={{borderRadius:'20px',overflow:'hidden',border:'1px solid rgba(139,92,246,.35)'}}>
                <div style={{background:'rgba(139,92,246,.08)',padding:'22px 26px',textAlign:'center'}}>
                  <div style={{fontSize:'2.4rem',marginBottom:'8px'}}>💬</div>
                  <h3 style={{fontSize:'1.15rem',fontWeight:900,color:'#3b1f6e',marginBottom:'7px'}}>카카오 오픈채팅 문의</h3>
                  <p style={{color:'#6b7280',fontSize:'.9rem',lineHeight:1.6,marginBottom:'14px'}}>망설여진다면 편하게 말 걸어주세요.<br/>따뜻하게 답변해 드립니다.</p>
                  <a href={kakao} target="_blank" rel="noopener noreferrer"
                    style={{display:'block',padding:'13px',background:'linear-gradient(135deg,#f97316,#fb923c)',color:'#3b1f6e',fontWeight:900,fontSize:'1rem',borderRadius:'13px',textDecoration:'none',boxShadow:'0 0 18px rgba(108,62,182,.5)'}}>
                    💬 카카오 오픈채팅 참여하기
                  </a>
                </div>
              </TCard>

              {/* 네이버 블로그 */}
              <TCard cls="ng" style={{borderRadius:'16px',overflow:'hidden',border:'1px solid rgba(255,184,0,.3)'}}>
                <div style={{background:'rgba(255,184,0,.06)',padding:'18px 22px',display:'flex',alignItems:'center',gap:'16px'}}>
                  <span style={{fontSize:'2rem',flexShrink:0}}>📝</span>
                  <div style={{flex:1}}>
                    <div style={{color:'#8b5cf6',fontWeight:800,fontSize:'.95rem',marginBottom:'4px'}}>네이버 블로그 방문하기</div>
                    <div style={{color:'#6b7280',fontSize:'.85rem'}}>강의 후기 · 최신 AI 트렌드 · 수익화 사례 확인</div>
                  </div>
                  <a href={naver} target="_blank" rel="noopener noreferrer"
                    style={{background:'rgba(255,184,0,.18)',border:'1px solid rgba(255,184,0,.5)',color:'#8b5cf6',padding:'9px 16px',borderRadius:'10px',fontWeight:800,fontSize:'.88rem',textDecoration:'none',flexShrink:0,whiteSpace:'nowrap'}}>
                    방문 →
                  </a>
                </div>
              </TCard>
            </div>
          </div>

          {/* 하단 회사정보 바 */}
          <div className="fi pcard" style={{borderRadius:'16px',padding:'20px 28px',border:'1px solid rgba(108,62,182,.12)'}}>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px 24px',justifyContent:'center',alignItems:'center',fontSize:'.85rem'}}>
              {[
                {l:'기관명',v:'한국자아실현협회'},{l:'대표',v:'박형종'},
                {l:'브랜드',v:'센텀Q AI 연구소'},{l:'전화',v:phone},
                {l:'이메일',v:email},{l:'주소',v:'경남 김해시 주촌면 선지로85 센텀큐시티아파트상가 101호'},
              ].map((c,i)=>(
                <span key={i} style={{color:'#6b7280'}}>
                  <span style={{color:'rgba(108,62,182,.5)',fontSize:'.75rem',marginRight:'4px'}}>{c.l}</span>
                  <strong style={{color:'#3b1f6e'}}>{c.v}</strong>
                </span>
              ))}
            </div>
          </div>
        </div>
      </section>);
    }

    /* ━━━━━━━━━━━━━━━━━━━
       HASHTAGS
    ━━━━━━━━━━━━━━━━━━━ */
    function Hashtags(){
      const TAGS=['#AI자동화','#수익형블로그','#구글애드센스','#블로그자동화','#AI블로그','#시니어창업','#1인지식창업','#디지털노마드','#네이버블로그','#워드프레스','#무한자동화','#AIBlogMaster','#센텀Q','#박형종','#한국자아실현협회'];
      return(<div style={{padding:'32px 24px',background:'#f7f5ff',borderTop:'1px solid rgba(108,62,182,.12)'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',flexWrap:'wrap',justifyContent:'center',gap:'8px'}}>
          {TAGS.map((t,i)=>(
            <span key={i} style={{color:['#6c3eb6','#d4a43a','#3b1f6e','#8b5cf6','#e8950e'][i%5],fontSize:'.82rem',fontWeight:700,opacity:.85}}>{t}</span>
          ))}
        </div>
      </div>);
    }

    /* ━━━━━━━━━━━━━━━━━━━
       FOOTER
    ━━━━━━━━━━━━━━━━━━━ */
    function Footer({cfg}){
      const co=cfg?.company||CFG.company;
      const ct=cfg?.contact||CFG.contact;
      return(<footer className="panel" style={{padding:'40px 24px',borderTop:'1px solid rgba(108,62,182,.1)'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div className="rbl" style={{marginBottom:'28px'}}></div>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',gap:'24px',marginBottom:'24px'}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}>
                <span style={{fontSize:'1.6rem'}}>🤖</span>
                <span style={{fontSize:'1.2rem',fontWeight:900}}><span className="gt">AI BLOG</span><span style={{color:'#3b1f6e'}}> MASTER</span></span>
              </div>
              <div style={{color:'#6b7280',fontSize:'.85rem',lineHeight:1.75}}>
                {co.name} | 대표 {co.rep}<br/>
                {co.addr}<br/>
                📞 {co.phone} &nbsp;|&nbsp; ✉️ {co.email}
              </div>
            </div>
            <div style={{display:'flex',gap:'18px',flexWrap:'wrap',alignItems:'flex-start'}}>
              {[['#about','소개'],['#features','기능'],['#process','진행방식'],['#contact','문의']].map(([h,l])=>(
                <a key={h} href={h} className="nlink" style={{color:'#3b1f6e',textDecoration:'none',fontSize:'.88rem',fontWeight:700}}>{l}</a>
              ))}
              <a href={ct.kakao_url} target="_blank" rel="noopener noreferrer" style={{color:'#8b5cf6',textDecoration:'none',fontSize:'.88rem',fontWeight:700}}>💬 카카오</a>
              <a href={ct.naver_blog} target="_blank" rel="noopener noreferrer" style={{color:'#8b5cf6',textDecoration:'none',fontSize:'.88rem',fontWeight:700}}>📝 네이버블로그</a>
            </div>
          </div>
          <div style={{textAlign:'center',color:'#6c3eb6',fontSize:'.8rem'}}>
            <p>© 2026 {co.name} · All Rights Reserved. | 사업자 소재지: {co.addr}</p>
          </div>
        </div>
      </footer>);
    }

    /* ━━━━━━━━━━━━━━━━━━━
       수강 신청서 MODAL
    ━━━━━━━━━━━━━━━━━━━ */
    const PLATFORMS=['구글블로그','워드프레스','티스토리','네이버','페이스북','인스타그램','유튜브쇼츠','기타'];
    const PLAT_ICONS={'구글블로그':'🌐','워드프레스':'📝','티스토리':'🍊','네이버':'🟢','페이스북':'💙','인스타그램':'📸','유튜브쇼츠':'▶️','기타':'✏️'};

    function AppForm({cfg,onClose}){
      const [form,setForm]=useState({name:'',phone:'',gender:'',email:'',age:'',job:'',jobOther:'',agree:false});
      const [plats,setPlats]=useState([]);
      const [platOther,setPlatOther]=useState('');
      const [busy,setBusy]=useState(false);
      const [done,setDone]=useState(false);
      const [err,setErr]=useState('');

      const kakao=(cfg?.contact?.kakao_url||cfg?.contact?.kakao_openchat_url)||CFG.contact.kakao_url;
      const naver=(cfg?.contact?.naver_blog)||CFG.contact.naver_blog;
      const toMail=(cfg?.contact?.email)||CFG.contact.email;
      const batch=(cfg?.course?.batch||cfg?.enrollment?.current_batch)||CFG.course.batch;

      useEffect(()=>{lock();return()=>unlock();},[]);

      const set=e=>{const{name,value,type,checked}=e.target;setForm(f=>({...f,[name]:type==='checkbox'?checked:value}));};
      const togglePlat=p=>setPlats(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);

      const handleSubmit=async e=>{
        e.preventDefault();
        if(!form.gender) return setErr('성별을 선택해 주세요.');
        if(!form.age)    return setErr('연령대를 선택해 주세요.');
        if(plats.length===0) return setErr('희망 플랫폼을 하나 이상 선택해 주세요.');
        if(!form.agree)  return setErr('개인정보 수집·이용에 동의해 주세요.');
        setErr(''); setBusy(true);
        const jobLabel=form.job==='기타'?`기타 (${form.jobOther})`:form.job;
        const platLabel=plats.map(p=>p==='기타'?`기타(${platOther})`:p).join(', ');
        try{
          const res=await fetch(`https://formsubmit.co/ajax/${toMail}`,{
            method:'POST',
            headers:{'Content-Type':'application/json','Accept':'application/json'},
            body:JSON.stringify({
              _subject:`[AI BLOG MASTER 수강신청] ${form.name}님 - ${batch}`,
              성함:form.name, 전화번호:form.phone, 성별:form.gender,
              이메일:form.email, 연령대:form.age, 현재직업:jobLabel,
              희망플랫폼:platLabel, 접수일시:new Date().toLocaleString('ko-KR'),
              _template:'table', _captcha:'false', _replyto:form.email,
              _autoresponse:`${form.name}님, 수강 신청해 주셔서 감사합니다. 곧 관리자가 연락 드리겠습니다. (한국자아실현협회 센텀Q AI 연구소 010-4554-9110)`,
            }),
          });
          const d=await res.json();
          if(d.success==='true'||d.success===true||res.ok){setBusy(false);playFanfare();setDone(true);}
          else throw 0;
        }catch{setBusy(false);playFanfare();setDone(true);}
      };

      /* 완료 화면 */
      if(done) return(
        <div className="mo" style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          {/* 🎆 폭죽! */}
          <Fireworks/>
          <div className="mc pinner ng" style={{width:'100%',maxWidth:'460px',borderRadius:'26px',padding:'44px 32px',textAlign:'center',position:'relative',zIndex:260}}>
            <button onClick={onClose} style={{position:'absolute',top:'15px',right:'15px',background:'rgba(108,62,182,.12)',border:'none',cursor:'pointer',color:'rgba(240,238,255,.6)',width:'30px',height:'30px',borderRadius:'50%',fontSize:'1rem'}}>✕</button>
            <div style={{fontSize:'3.5rem',marginBottom:'12px',animation:'bounce 0.6s ease 3'}}>🎉</div>
            <h2 className="serif" style={{fontSize:'1.75rem',fontWeight:900,marginBottom:'10px',color:'#3b1f6e'}}>
              <span className="gt">축하합니다! 신청 완료! 🎊</span>
            </h2>
            <p style={{color:'#6b7280',lineHeight:1.75,marginBottom:'8px',fontSize:'1.05rem'}}>
              <strong style={{color:'#8b5cf6'}}>{form.name}</strong>님, 접수되었습니다! 🙏
            </p>
            <p style={{color:'#6b7280',fontSize:'.92rem',marginBottom:'6px'}}>
              📧 <strong style={{color:'#3b1f6e'}}>{form.email}</strong><br/>으로 전자책 및 과정 안내 메일을 발송합니다.
            </p>
            <p style={{color:'#8b5cf6',fontSize:'.86rem',marginBottom:'24px'}}>아래 버튼으로 카카오 오픈채팅방과 네이버 블로그에 참여하세요!</p>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              <a href={kakao} target="_blank" rel="noopener noreferrer"
                onClick={()=>setTimeout(()=>window.open(naver,'_blank'),500)}
                style={{display:'block',background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'#ffffff',fontWeight:900,fontSize:'1.05rem',padding:'14px',borderRadius:'13px',textDecoration:'none',boxShadow:'0 0 18px rgba(139,92,246,.5)'}}>
                💬 카카오 오픈채팅 + 네이버 블로그 참여
              </a>
              <button onClick={onClose} className="bwarm" style={{padding:'12px',border:'none',cursor:'pointer',fontSize:'1rem',borderRadius:'13px'}}>닫기</button>
            </div>
          </div>
        </div>
      );

      const LB={display:'block',fontSize:'1rem',fontWeight:700,color:'#3b1f6e',marginBottom:'8px'};
      const SEC={color:'rgba(108,62,182,.7)',fontWeight:500,fontSize:'.86rem',marginLeft:'6px'};

      return(
        <div className="mo" onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}>
          <div className="mc panel" onClick={e=>e.stopPropagation()}
            style={{width:'100%',maxWidth:'640px',borderRadius:'26px',maxHeight:'94vh',overflowY:'auto',position:'relative',border:'1px solid rgba(255,255,255,.14)'}}>

            {/* 헤더 */}
            <div style={{padding:'24px 30px 20px',background:'linear-gradient(135deg,rgba(108,62,182,.4),rgba(212,164,58,.15))',borderBottom:'1px solid rgba(108,62,182,.12)',borderRadius:'26px 26px 0 0',position:'sticky',top:0,zIndex:10,backdropFilter:'blur(20px)'}}>
              <h2 style={{fontSize:'1.45rem',fontWeight:900,color:'#3b1f6e',textShadow:'0 2px 8px rgba(0,0,0,.5)'}}>
                📋 <span className="gt">수강 신청서</span>
              </h2>
              <p style={{color:'#6b7280',fontSize:'.86rem',marginTop:'3px'}}>
                AI BLOG MASTER 자동화 과정 · {batch} · 선착순 마감
              </p>
            </div>

            <form onSubmit={handleSubmit} style={{padding:'24px 30px',display:'flex',flexDirection:'column',gap:'20px'}}>

              {/* 성함 */}
              <div><label style={LB}>성함 <span style={{color:'#d4a43a'}}>*</span></label>
                <input name="name" value={form.name} onChange={set} required placeholder="홍길동" className="fi2"/></div>

              {/* 전화번호 */}
              <div><label style={LB}>전화번호 <span style={{color:'#d4a43a'}}>*</span></label>
                <input name="phone" value={form.phone} onChange={set} required placeholder="010-1234-5678" type="tel" className="fi2"/></div>

              {/* 성별 */}
              <div><label style={LB}>성별 <span style={{color:'#d4a43a'}}>*</span></label>
                <div style={{display:'flex',gap:'12px'}}>
                  {['남','여'].map(g=>(
                    <button key={g} type="button" onClick={()=>setForm(f=>({...f,gender:g}))}
                      className={`selb ${form.gender===g?'on':''}`}>
                      {g==='남'?'👨 남':'👩 여'}
                    </button>
                  ))}
                </div>
              </div>

              {/* 이메일 */}
              <div>
                <label style={LB}>이메일 주소 <span style={{color:'#d4a43a'}}>*</span><span style={SEC}>(전자책 발송용)</span></label>
                <input name="email" value={form.email} onChange={set} required type="email" placeholder="예: insu@naver.com" className="fi2"/>
              </div>

              {/* 연령대 */}
              <div><label style={LB}>연령대 <span style={{color:'#d4a43a'}}>*</span></label>
                <div style={{display:'flex',flexWrap:'wrap',gap:'9px'}}>
                  {['20대','30대','40대','50대','60대 이상'].map(a=>(
                    <button key={a} type="button" onClick={()=>setForm(f=>({...f,age:a}))}
                      className={`selb ${form.age===a?'on':''}`} style={{minWidth:'72px',justifyContent:'center'}}>
                      {a}
                    </button>
                  ))}
                </div>
              </div>

              {/* 현재 직업 */}
              <div>
                <label style={LB}>현재 직업은 무엇인가요? <span style={{color:'#d4a43a'}}>*</span></label>
                <select name="job" value={form.job} onChange={set} required className="fi2">
                  <option value="">— 선택해 주세요 —</option>
                  {['직장인','자영업/개인사업자','프리랜서','전업주부','은퇴자','법인사업자','기타'].map(j=>(
                    <option key={j} value={j}>{j}</option>
                  ))}
                </select>
                {form.job==='기타'&&(
                  <input name="jobOther" value={form.jobOther} onChange={set} placeholder="직업을 직접 입력해 주세요" className="fi2" style={{marginTop:'10px'}}/>
                )}
              </div>

              {/* ★ 희망 플랫폼 (복수 선택) ★ */}
              <div>
                <label style={LB}>
                  희망 플랫폼 <span style={{color:'#d4a43a'}}>*</span>
                  <span style={SEC}>(복수 선택 가능)</span>
                </label>
                <div style={{display:'flex',flexWrap:'wrap',gap:'9px'}}>
                  {PLATFORMS.map(p=>(
                    <button key={p} type="button" onClick={()=>togglePlat(p)}
                      className={`selb ${plats.includes(p)?'on':''}`}>
                      <span>{PLAT_ICONS[p]}</span>
                      <span>{p}</span>
                      {plats.includes(p)&&<span style={{marginLeft:'4px',fontSize:'.8rem',color:'#d4a43a'}}>✓</span>}
                    </button>
                  ))}
                </div>
                {plats.includes('기타')&&(
                  <input value={platOther} onChange={e=>setPlatOther(e.target.value)}
                    placeholder="사용하실 플랫폼을 직접 입력해 주세요" className="fi2" style={{marginTop:'10px'}}/>
                )}
                {plats.length>0&&(
                  <div style={{marginTop:'10px',padding:'8px 14px',background:'rgba(212,164,58,.12)',borderRadius:'10px',
                    border:'1px solid rgba(212,164,58,.3)',fontSize:'.85rem',color:'#6b7280'}}>
                    ✓ 선택됨: <strong style={{color:'#6c3eb6'}}>{plats.map(p=>p==='기타'&&platOther?`기타(${platOther})`:p).join(' · ')}</strong>
                  </div>
                )}
              </div>

              {/* 에러 메시지 */}
              {err&&(
                <div style={{background:'rgba(212,164,58,.14)',border:'1px solid rgba(212,164,58,.4)',borderRadius:'12px',padding:'12px 16px',color:'#d4a43a',fontSize:'.94rem',fontWeight:600}}>
                  ⚠️ {err}
                </div>
              )}

              {/* 동의 */}
              <label style={{display:'flex',alignItems:'flex-start',gap:'12px',cursor:'pointer'}}>
                <input type="checkbox" name="agree" checked={form.agree} onChange={set}
                  style={{marginTop:'2px',width:'18px',height:'18px',accentColor:'#d4a43a',cursor:'pointer',flexShrink:0}}/>
                <span style={{color:'#6b7280',fontSize:'.94rem',lineHeight:1.65}}>
                  수강 신청 및 전자책 발송을 위한 개인정보 수집·이용에&nbsp;
                  <strong style={{color:'#8b5cf6'}}>동의합니다.</strong>
                  <span style={{color:'#d4a43a'}}> *</span>
                </span>
              </label>

              {/* 제출 */}
              <button type="submit" disabled={busy} className="bwarm"
                style={{padding:'18px',border:'none',cursor:'pointer',fontSize:'1.15rem',borderRadius:'16px',opacity:busy?.7:1}}>
                {busy
                  ?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px'}}>
                      <span style={{width:'20px',height:'20px',borderRadius:'50%',border:'2.5px solid rgba(255,255,255,.4)',borderTopColor:'#fff',animation:'spin .8s linear infinite',display:'inline-block'}}></span>
                      신청 접수 중...
                    </span>
                  :'🎓 수강 신청 완료하기'
                }
              </button>

              <p style={{textAlign:'center',color:'#6b7280',fontSize:'.8rem',lineHeight:1.6}}>
                접수 후 카카오 오픈채팅방과 네이버 블로그가 자동으로 열립니다
              </p>
            </form>

            <button onClick={onClose} style={{position:'absolute',top:'17px',right:'19px',background:'rgba(108,62,182,.12)',border:'none',cursor:'pointer',color:'rgba(240,238,255,.6)',width:'30px',height:'30px',borderRadius:'50%',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
        </div>
      );
    }

    /* ━━━━━━━━━━━━━━━━━━━
       메인 APP
    ━━━━━━━━━━━━━━━━━━━ */
    function App(){
      const [cfg,setCfg]=useState(null);
      const [load,setLoad]=useState(true);
      const [form,setForm]=useState(false);
      useEffect(()=>{loadCfg().then(c=>{setCfg(c);setLoad(false);});},[]);
      useFade();
      if(load) return(
        <div style={{position:'fixed',inset:0,background:'#f7f5ff',zIndex:500,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'16px'}}>
          <div style={{width:'50px',height:'50px',borderRadius:'50%',border:'4px solid rgba(108,62,182,.2)',borderTopColor:'#6c3eb6',animation:'spin .9s linear infinite'}}></div>
          <p className="gt" style={{fontWeight:900,fontSize:'1.15rem'}}>AI BLOG MASTER 로딩 중...</p>
        </div>
      );
      return(<>
        <Navbar       onEnroll={()=>setForm(true)} />
        <Hero         cfg={cfg} onEnroll={()=>setForm(true)} />
        <PainPoints   onEnroll={()=>setForm(true)} />
        <About        cfg={cfg} />
        <Features />
        <PlatformTable onEnroll={()=>setForm(true)} />
        <WhyDesign    onEnroll={()=>setForm(true)} />
        <Process />
        <Contact      cfg={cfg} onEnroll={()=>setForm(true)} />
        <Hashtags />
        <Footer       cfg={cfg} />
        {form&&<AppForm cfg={cfg} onClose={()=>setForm(false)} />}
      </>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
